version : "3.8"

services:
  # Shared Redis Database
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # The Dummy Microservice Backend
  backend:
    build: .
    command: npm run backend
    ports:
      - "4000:4000"
  
  # Gateway Instance A
  gateway-a:
    build: .
    command: npm run start
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://backend:4000
      - INSTANCE_ID=gateway-a
      - JWT_SECRET=my_ultra_secure_secret_key_12345
    depends_on:
      - redis
      - backend

  # Gateway Instance B
  gateway-b:
    build: .
    command: npm run start
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://backend:4000
      - INSTANCE_ID=gateway-b
      - JWT_SECRET=my_ultra_secure_secret_key_12345
    depends_on:
      - redis
      - backend

  # Nginx Load Balancer (Port 3000 -> 80)
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-a
      - gateway-b